<!DOCTYPE html>
<html>
<head>
    <title>Real Estate Listing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f8f9fa;
        }
        .card img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <h2 class="text-center mb-4"><i class="fa-solid fa-house"></i> Real Estate Listings</h2>

    <!-- Search + Filter -->
    <div class="row mb-4">
        <div class="col-md-6">
            <input type="text" id="search" class="form-control" placeholder="Search by location">
        </div>
        <div class="col-md-6">
            <select id="filter" class="form-control">
                <option value="all">All Types</option>
                <option value="Apartment">Apartment</option>
                <option value="Villa">Villa</option>
                <option value="House">House</option>
            </select>
        </div>
    </div>

    <!-- Cards -->
    <div class="row" id="propertyList"></div>
</div>

<script>

const properties = [
    {
        image: "https://images.unsplash.com/photo-1568605114967-8130f3a36994",
        price: "₹50 Lakhs",
        location: "Hyderabad",
        type: "Apartment"
    },
    {
        image: "https://images.unsplash.com/photo-1572120360610-d971b9d7767c",
        price: "₹1.2 Crore",
        location: "Bangalore",
        type: "Villa"
    },
    {
        image: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c",
        price: "₹80 Lakhs",
        location: "Chennai",
        type: "House"
    }
];

const list = document.getElementById("propertyList");
const search = document.getElementById("search");
const filter = document.getElementById("filter");

// Display properties
function showProperties(data) {
    list.innerHTML = "";

    data.forEach(p => {
        list.innerHTML += `
        <div class="col-md-4 mb-4">
            <div class="card shadow">
                <img src="${p.image}" class="card-img-top">
                <div class="card-body text-center">
                    <h5>${p.price}</h5>
                    <p>${p.location}</p>
                    <span class="badge bg-primary">${p.type}</span>
                </div>
            </div>
        </div>`;
    });
}

// Filter function
function filterData() {
    const searchValue = search.value.toLowerCase();
    const filterValue = filter.value;

    const result = properties.filter(p =>
        p.location.toLowerCase().includes(searchValue) &&
        (filterValue === "all" || p.type === filterValue)
    );

    showProperties(result);
}

// Events
search.addEventListener("keyup", filterData);
filter.addEventListener("change", filterData);

// Initial load
showProperties(properties);</script>

</body>
</html>
